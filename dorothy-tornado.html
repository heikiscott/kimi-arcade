<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>多罗西龙卷风梦境</title>
    <link rel="stylesheet" href="dorothy-tornado.css" />
  </head>
  <body>
    <a class="home-link" href="arcade.html">游戏大厅</a>
    <main class="dream-shell">
      <section class="dream-stage" id="stage" data-view="outside" aria-label="多罗西龙卷风梦境动画">
        <div class="sky"></div>
        <div class="sun"></div>
        <div class="farm"></div>
        <div class="tornado">
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="house">
          <div class="roof"></div>
          <div class="body">
            <span class="window"></span>
            <span class="door"></span>
          </div>
          <div class="girl">D</div>
        </div>
        <div class="landing-dust"></div>
        <div class="inside-scene" aria-hidden="true">
          <div class="room">
            <div class="room-window">
              <div class="vision grandma">
                <div class="little-person grandma-person">
                  <span class="person-head"></span>
                  <span class="person-hair"></span>
                  <span class="person-body"></span>
                  <span class="snack"></span>
                </div>
                <strong>老奶奶吃点心</strong>
              </div>
              <div class="vision chicken">
                <div class="coop"></div>
                <div class="little-chicken"></div>
                <strong>鸡窝和鸡</strong>
              </div>
              <div class="vision brothers">两兄弟<br />划船</div>
              <div class="vision witch">
                <div class="gulch-change">
                  <div class="little-person lady-person">
                    <span class="person-head"></span>
                    <span class="person-body"></span>
                  </div>
                  <div class="witch-person">
                    <span class="witch-hat"></span>
                    <span class="witch-head"></span>
                    <span class="witch-body"></span>
                  </div>
                </div>
                <strong>古尔奇小姐变女巫</strong>
              </div>
            </div>
            <div class="bed">
              <div class="blanket"></div>
              <div class="dorothy-bed">
                <span class="dorothy-head"></span>
                <span class="dorothy-dress"></span>
                <span class="toto-dog"></span>
                <strong>多罗西抱着托托</strong>
              </div>
            </div>
            <div class="room-shake-line line-one"></div>
            <div class="room-shake-line line-two"></div>
          </div>
        </div>
        <div class="dream-card">
          <p class="label">Kansas Dream</p>
          <h1>多罗西的龙卷风梦</h1>
          <p>房子被龙卷风卷到天上，外面能看到房子飞起又落下；里面能看到多罗西抱着托托，看见一串梦里的奇怪画面。</p>
        </div>
        <div class="controls" aria-label="选择观看位置">
          <button id="outsideBtn" class="active" type="button">看外面</button>
          <button id="insideBtn" type="button">看里面</button>
          <button id="playBtn" type="button">播放梦境</button>
        </div>
      </section>
    </main>
    <script src="dorothy-tornado.js"></script>
  </body>
</html>
