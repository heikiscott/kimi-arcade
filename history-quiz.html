<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>历史与节日题</title>
    <link rel="stylesheet" href="study-games.css" />
  </head>
  <body data-game="history">
    <a class="home-link" href="arcade.html">游戏大厅</a>
    <main class="study-shell">
      <section class="study-stage history-stage">
        <div class="score-row">
          <span>分数 <strong id="scoreText">0</strong></span>
          <span>第 <strong id="roundText">1</strong> 题</span>
        </div>
        <div class="big-card">
          <p class="label">History Quiz</p>
          <h1 id="questionText">丝绸之路连接了哪里？</h1>
          <p id="hintText">历史、文明和传统节日一起练。</p>
        </div>
        <div class="answer-grid" id="answerGrid"></div>
      </section>

      <section class="study-panel">
        <p class="label">练习历史</p>
        <h2>历史与节日题</h2>
        <p id="statusText">丝绸之路、特洛伊战争、荷马史诗、埃及法老、胡夫金字塔，还有中外传统节日日期。</p>
        <button id="nextBtn" type="button">下一题</button>
        <button id="restartBtn" type="button">重新开始</button>
      </section>
    </main>
    <script src="study-games.js"></script>
  </body>
</html>
