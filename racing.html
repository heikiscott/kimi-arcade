<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>天空地下赛车</title>
    <link rel="stylesheet" href="racing.css" />
  </head>
  <body>
    <a class="home-link" href="arcade.html">游戏大厅</a>
    <main class="race-shell">
      <section class="race-stage">
        <canvas id="raceCanvas" width="900" height="620" aria-label="赛车小游戏"></canvas>
        <div class="finish-card" id="finishCard">
          <p>Finish</p>
          <h1 id="finishTitle">冲线成功!</h1>
          <span id="finishText">你的赛车到终点了。</span>
          <button id="againBtn" type="button">再跑一次</button>
        </div>
      </section>

      <section class="race-panel">
        <div>
          <p class="label">Racing Builder</p>
          <h2>赛车大集合</h2>
          <p id="status">选好地图和车，点开始赛车。</p>
        </div>

        <div class="control-block">
          <strong>地图</strong>
          <div class="choice-grid" id="trackChoices"></div>
        </div>

        <div class="control-block">
          <strong>星级</strong>
          <div class="star-row" id="starChoices"></div>
        </div>

        <div class="control-block">
          <strong>赛车</strong>
          <div class="choice-grid" id="carChoices"></div>
        </div>

        <div class="control-block">
          <strong>驾驶员</strong>
          <div class="choice-grid small" id="driverChoices"></div>
        </div>

        <div class="control-block">
          <strong>轮胎</strong>
          <div class="choice-grid small" id="tireChoices"></div>
        </div>

        <div class="control-block">
          <strong>翅膀和车标</strong>
          <div class="choice-grid small" id="wingChoices"></div>
          <div class="choice-grid small" id="iconChoices"></div>
        </div>

        <div class="button-row">
          <button id="startBtn" type="button">开始赛车</button>
          <button id="resetBtn" type="button">重新选择</button>
        </div>
        <p class="hint">键盘：A/D 或左右键转弯，W 加速，S 刹车。</p>
      </section>
    </main>
    <script src="racing.js"></script>
  </body>
</html>
