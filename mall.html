<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>商场买东西</title>
    <link rel="stylesheet" href="mall.css" />
  </head>
  <body>
    <a class="home-link" href="arcade.html">游戏大厅</a>
    <main class="mall-shell">
      <section class="stage">
        <canvas id="mallCanvas" width="960" height="620" aria-label="商场买东西小游戏"></canvas>
        <div class="money-card">
          <span>零钱包</span>
          <strong id="moneyText">500 元</strong>
        </div>
      </section>

      <section class="panel">
        <div>
          <p class="label">Shopping Mall</p>
          <h1>商场买东西</h1>
          <p id="statusText">现在是一楼美食层。可以换楼层，二楼有地铁站。</p>
        </div>

        <div class="floor-panel">
          <strong id="floorText">电梯按钮 · 1F 美食餐厅</strong>
          <div class="floor-grid" id="floorGrid" aria-label="商场楼层"></div>
        </div>

        <div class="remote">
          <button id="upBtn" type="button">上走</button>
          <button id="leftBtn" type="button">左走</button>
          <button id="rightBtn" type="button">右走</button>
          <button id="downBtn" type="button">下走</button>
          <button id="buyBtn" type="button">买东西</button>
          <button id="eatBtn" type="button">去餐厅</button>
          <button id="toyBtn" type="button">去玩具店</button>
          <button id="payBtn" type="button">结账</button>
          <button id="metroBtn" type="button">去地铁站</button>
        </div>

        <div class="metro-actions" aria-label="地铁目的地">
          <button id="toParkBtn" type="button">坐地铁到超级游乐园</button>
          <button id="toHomeBtn" type="button">坐地铁回家</button>
        </div>

        <div class="bag">
          <strong>购物袋</strong>
          <div id="bagList">还没有买东西。</div>
        </div>

        <p class="hint">键盘：1-6 换楼层，W/A/S/D 或方向键走路，空格买东西，E 去餐厅，T 去玩具店，M 去地铁站。</p>
      </section>
    </main>
    <script src="mall.js"></script>
  </body>
</html>
