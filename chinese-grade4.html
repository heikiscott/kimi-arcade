<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>四年级语文练习</title>
    <link rel="stylesheet" href="study-games.css" />
  </head>
  <body data-game="chinese">
    <a class="home-link" href="arcade.html">游戏大厅</a>
    <main class="study-shell">
      <section class="study-stage chinese-stage">
        <div class="score-row">
          <span>分数 <strong id="scoreText">0</strong></span>
          <span>第 <strong id="roundText">1</strong> 题</span>
        </div>
        <div class="big-card">
          <p class="label">Chinese Practice</p>
          <h1 id="questionText">成语是什么意思？</h1>
          <p id="hintText">原创四年级语文练习，不照抄教材课文。</p>
        </div>
        <div class="answer-grid" id="answerGrid"></div>
      </section>

      <section class="study-panel">
        <p class="label">练习语文</p>
        <h2>四年级语文</h2>
        <p id="statusText">练成语、近义词、修辞、标点、阅读概括和作文方法。</p>
        <button id="nextBtn" type="button">下一题</button>
        <button id="restartBtn" type="button">重新开始</button>
      </section>
    </main>
    <script src="study-games.js"></script>
  </body>
</html>
