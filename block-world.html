<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>方块世界</title>
    <link rel="stylesheet" href="block-world.css" />
  </head>
  <body>
    <a class="home-link" href="arcade.html">游戏大厅</a>
    <main class="world-shell">
      <section class="world-stage">
        <canvas id="worldCanvas" width="980" height="640" aria-label="方块世界小游戏"></canvas>
        <div class="place-card">
          <span>当前位置</span>
          <strong id="placeText">家园空地</strong>
        </div>
      </section>

      <section class="world-panel">
        <div>
          <p class="label">Block World</p>
          <h1>方块世界</h1>
          <p id="statusText">选择方块，然后点地图就能盖东西。所有交通都是免费的。</p>
        </div>

        <div class="block-grid" id="blockGrid" aria-label="方块选择"></div>

        <div class="button-grid">
          <button id="upBtn" type="button">上走</button>
          <button id="leftBtn" type="button">左走</button>
          <button id="rightBtn" type="button">右走</button>
          <button id="downBtn" type="button">下走</button>
          <button id="houseBtn" type="button">一键盖房子</button>
          <button id="villaBtn" type="button">建我的别墅</button>
          <button id="hangarBtn" type="button">看飞机库</button>
          <button id="demoPlaneBtn" type="button">一次性拆楼飞机</button>
          <button id="clearBtn" type="button">清空空地</button>
          <button id="villageBtn" type="button">去乡村</button>
          <button id="cityBtn" type="button">去高楼城市</button>
          <button id="subwayBtn" type="button">去地铁站</button>
          <button id="airportBtn" type="button">去机场</button>
          <button id="railBtn" type="button">去高铁站</button>
          <button id="elevatorBtn" type="button">坐电梯</button>
          <button id="rideSubwayBtn" type="button">免费坐地铁</button>
          <button id="flyBtn" type="button">免费坐飞机</button>
          <button id="trainBtn" type="button">免费坐高铁</button>
        </div>

        <p class="hint">鼠标/手指：点格子放方块。键盘：W/A/S/D 走路，1-6 选方块，H 盖房子，B 建别墅，V 乡村，C 城市，M 地铁，A 机场，R 高铁。</p>
      </section>
    </main>
    <script src="block-world.js"></script>
  </body>
</html>
