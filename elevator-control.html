<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>电梯遥控器</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        color: #172632;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #8ed0f1, #e9f6fb 55%, #334653 55%, #182734);
      }
      .home-link {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 20;
        padding: 8px 12px;
        border-radius: 8px;
        color: #172632;
        background: #fffaf0;
        font-weight: 950;
        text-decoration: none;
      }
      .remote {
        position: fixed;
        left: 12px;
        right: 12px;
        top: 64px;
        z-index: 30;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        padding: 12px;
        border: 4px solid #172632;
        border-radius: 8px;
        background: #ffd15f;
        box-shadow: 0 18px 38px rgba(23, 38, 50, 0.24);
      }
      .remote strong {
        grid-column: 1 / -1;
        font-size: 1.2rem;
        font-weight: 950;
      }
      button {
        min-height: 46px;
        border: 0;
        border-radius: 8px;
        color: #fff;
        background: #245b8f;
        cursor: pointer;
        font: inherit;
        font-weight: 950;
      }
      #fallBtn { background: #8b1e2d; }
      #resetBtn { background: #172632; }
      .status {
        position: fixed;
        right: 16px;
        top: 190px;
        z-index: 20;
        padding: 10px 12px;
        border-radius: 8px;
        color: #fff;
        background: rgba(23, 38, 50, 0.86);
        font-weight: 950;
      }
      .scene {
        position: relative;
        min-height: 100vh;
        padding-top: 230px;
        overflow: hidden;
      }
      .tower {
        position: relative;
        width: 240px;
        height: 680px;
        margin: 0 auto 32px;
      }
      .tower::before {
        content: "";
        position: absolute;
        inset: 0 34px;
        clip-path: polygon(50% 0, 72% 18%, 76% 100%, 24% 100%, 28% 18%);
        background:
          linear-gradient(90deg, rgba(255,255,255,.18) 1px, transparent 1px),
          linear-gradient(rgba(255,255,255,.16) 1px, transparent 1px),
          linear-gradient(180deg, #c6d5dc, #667985 64%, #425967);
        background-size: 18px 18px, 18px 18px, auto;
        border: 2px solid rgba(255,255,255,.6);
      }
      .shaft {
        position: absolute;
        left: 50%;
        top: 54px;
        bottom: 24px;
        width: 94px;
        border: 3px solid rgba(23, 38, 50, .4);
        border-radius: 999px 999px 8px 8px;
        background: rgba(232, 244, 248, .36);
        transform: translateX(-50%);
      }
      .floor-label {
        position: absolute;
        left: 104px;
        min-width: 105px;
        padding: 6px 8px;
        border-radius: 8px;
        color: #fff;
        background: rgba(23, 38, 50, .78);
        font-size: .8rem;
        font-weight: 950;
      }
      .floor-two { top: 0; }
      .floor-one { bottom: 0; }
      .cable {
        position: absolute;
        top: 0;
        width: 4px;
        height: var(--cable-height, 86%);
        border-radius: 999px;
        background: #172632;
        transition: height 1s ease, opacity 200ms ease, transform 200ms ease;
      }
      .cable.left { left: 31px; }
      .cable.right { right: 31px; }
      .broken .cable {
        height: 8%;
        opacity: .6;
        transform: rotate(-10deg);
      }
      .elevator {
        position: absolute;
        left: 50%;
        top: var(--elevator-top, calc(100% - 90px));
        display: grid;
        place-items: center;
        width: 64px;
        height: 78px;
        overflow: hidden;
        border: 4px solid #fff;
        border-radius: 8px;
        background: linear-gradient(180deg, #506979, #263b49);
        transform: translateX(-50%);
        transition: top 1.2s ease, transform 280ms ease;
      }
      .falling .elevator {
        transition: top 2.4s cubic-bezier(.12,.66,.14,1), transform 280ms ease;
      }
      .door {
        position: absolute;
        top: 0;
        bottom: 0;
        z-index: 3;
        width: 50%;
        background: linear-gradient(180deg, #d8e7ee, #7f96a3);
        transition: transform 420ms ease;
      }
      .door.left { left: 0; }
      .door.right { right: 0; }
      .doors-open .door.left { transform: translateX(-82%); }
      .doors-open .door.right { transform: translateX(82%); }
      .dummy {
        position: relative;
        z-index: 2;
        width: 34px;
        height: 48px;
      }
      .dummy::before {
        content: "";
        position: absolute;
        left: 9px;
        top: 2px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #ffd15f;
      }
      .dummy::after {
        content: "";
        position: absolute;
        left: 6px;
        bottom: 2px;
        width: 22px;
        height: 30px;
        border-radius: 10px 10px 5px 5px;
        background: #d93a32;
      }
      .dust {
        position: absolute;
        left: 50%;
        bottom: 10px;
        width: 220px;
        height: 70px;
        border-radius: 50%;
        opacity: 0;
        background: radial-gradient(circle at 20% 60%, rgba(199,188,168,.86) 0 22%, transparent 23%),
          radial-gradient(circle at 48% 48%, rgba(171,160,142,.9) 0 32%, transparent 33%),
          radial-gradient(circle at 78% 62%, rgba(194,183,164,.78) 0 24%, transparent 25%);
        transform: translateX(-50%) scale(.5);
      }
      .dust.show { animation: puff 900ms ease-out forwards; }
      @keyframes puff {
        55% { opacity: .95; transform: translateX(-50%) scale(1.25); }
        100% { opacity: .42; transform: translateX(-50%) scale(1.55); }
      }
      @media (max-width: 720px) {
        .remote { grid-template-columns: 1fr 1fr; }
        .status { position: static; margin: 12px; width: fit-content; }
        .scene { padding-top: 360px; }
      }
    </style>
  </head>
  <body>
    <a class="home-link" href="arcade.html">游戏大厅</a>
    <div class="remote">
      <strong>电梯遥控器</strong>
      <button id="upBtn" type="button">上到 2 楼</button>
      <button id="downBtn" type="button">下到 1 楼</button>
      <button id="openBtn" type="button">开门</button>
      <button id="closeBtn" type="button">关门</button>
      <button id="fallBtn" type="button">断绳坠落</button>
      <button id="demoBtn" type="button">自动演示</button>
      <button id="resetBtn" type="button">重来</button>
    </div>
    <div class="status" id="status">1 楼 · 门关</div>
    <main class="scene">
      <div class="tower" id="tower">
        <div class="shaft">
          <span class="floor-label floor-two">2 楼 / 顶楼</span>
          <span class="floor-label floor-one">1 楼 / 最下面</span>
          <span class="cable left"></span>
          <span class="cable right"></span>
          <div class="elevator">
            <span class="door left"></span>
            <span class="door right"></span>
            <span class="dummy"></span>
          </div>
          <div class="dust" id="dust"></div>
        </div>
      </div>
    </main>
    <script>
      const tower = document.querySelector("#tower");
      const statusEl = document.querySelector("#status");
      const dust = document.querySelector("#dust");
      let floor = 1;
      let doorOpen = false;
      let timers = [];

      function clearTimers() {
        timers.forEach((timer) => clearTimeout(timer));
        timers = [];
      }

      function schedule(callback, delay) {
        const timer = setTimeout(callback, delay);
        timers.push(timer);
      }

      function setStatus(text) {
        statusEl.textContent = text || `${floor} 楼 · ${doorOpen ? "门开" : "门关"}`;
      }

      function setFloor(nextFloor, duration = 1200) {
        floor = nextFloor;
        tower.style.setProperty("--elevator-top", nextFloor === 2 ? "6%" : "calc(100% - 90px)");
        tower.style.setProperty("--cable-height", nextFloor === 2 ? "14%" : "86%");
        document.querySelector(".elevator").style.transitionDuration = `${duration}ms`;
        document.querySelectorAll(".cable").forEach((cable) => {
          cable.style.transitionDuration = `${duration}ms`;
        });
      }

      function reset(full = true) {
        clearTimers();
        tower.classList.remove("doors-open", "broken", "falling");
        dust.classList.remove("show");
        doorOpen = false;
        if (full) {
          setFloor(1, 400);
          setStatus("1 楼 · 门关");
        }
      }

      function up() {
        reset(false);
        setFloor(2, 1500);
        setStatus("正在上升到 2 楼");
        schedule(() => setStatus("2 楼 / 顶楼 · 门关"), 1550);
      }

      function down() {
        reset(false);
        setFloor(1, 1500);
        setStatus("正在下降到 1 楼");
        schedule(() => setStatus("1 楼 / 最下面 · 门关"), 1550);
      }

      function openDoor() {
        tower.classList.add("doors-open");
        doorOpen = true;
        setStatus();
      }

      function closeDoor() {
        tower.classList.remove("doors-open");
        doorOpen = false;
        setStatus();
      }

      function fall() {
        reset(false);
        closeDoor();
        tower.classList.add("broken");
        setStatus("绳子断了，正在坠到 1 楼");
        schedule(() => {
          tower.classList.add("falling");
          setFloor(1, 2400);
        }, 120);
        schedule(() => {
          dust.classList.remove("show");
          void dust.offsetWidth;
          dust.classList.add("show");
          setStatus("1 楼 · 蹦!");
        }, 2600);
      }

      function demo() {
        reset();
        up();
        schedule(fall, 1800);
      }

      document.querySelector("#upBtn").addEventListener("click", up);
      document.querySelector("#downBtn").addEventListener("click", down);
      document.querySelector("#openBtn").addEventListener("click", openDoor);
      document.querySelector("#closeBtn").addEventListener("click", closeDoor);
      document.querySelector("#fallBtn").addEventListener("click", fall);
      document.querySelector("#demoBtn").addEventListener("click", demo);
      document.querySelector("#resetBtn").addEventListener("click", reset);
    </script>
  </body>
</html>
