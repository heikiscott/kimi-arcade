<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>高塔电梯短片</title>
    <link rel="stylesheet" href="elevator-tower.css" />
  </head>
  <body>
    <a class="home-link" href="arcade.html">游戏大厅</a>
    <div class="remote-panel" aria-label="电梯遥控器">
      <strong>电梯遥控器</strong>
      <button data-elevator-action="up" type="button">上到 2 楼</button>
      <button data-elevator-action="down" type="button">下到 1 楼</button>
      <button data-elevator-action="open" type="button">开门</button>
      <button data-elevator-action="close" type="button">关门</button>
      <button data-elevator-action="fall" type="button">断绳坠落</button>
      <button data-elevator-action="demo" type="button">自动演示</button>
      <button data-elevator-action="reset" type="button">重来</button>
    </div>
    <main class="tower-shell">
      <section class="tower-stage" id="stage" aria-label="高塔电梯钢缆断裂安全示意">
        <div class="sky"></div>
        <div class="city"></div>
        <div class="tower">
          <div class="spire"></div>
          <div class="shaft">
            <span class="floor-label floor-two">2 楼 / 顶楼</span>
            <span class="floor-label floor-one">1 楼 / 最下面</span>
            <span class="cable cable-left"></span>
            <span class="cable cable-right"></span>
            <span class="snap snap-left"></span>
            <span class="snap snap-right"></span>
            <div class="elevator">
              <span class="door door-left"></span>
              <span class="door door-right"></span>
              <div class="dummy">
                <span class="dummy-head"></span>
                <span class="dummy-body"></span>
              </div>
              <span class="dummy-label">玩偶</span>
            </div>
          </div>
          <div class="windows"></div>
        </div>
        <div class="dust"></div>
        <div class="title-card">
          <p class="label">Safety Short</p>
          <h1>高塔电梯控制台</h1>
          <p>里面是玩偶假人，不是真人。你可以控制上楼、下楼、开门、关门，也可以让钢缆断开坠到 1 楼。</p>
        </div>
        <div class="speed-tag" id="statusTag">1 楼 · 门关</div>
        <div class="controls" aria-label="电梯控制台">
          <strong class="control-title">电梯控制台</strong>
          <button id="upBtn" type="button">上到 2 楼</button>
          <button id="downBtn" type="button">下到 1 楼</button>
          <button id="openBtn" type="button">开门</button>
          <button id="closeBtn" type="button">关门</button>
          <button id="fallBtn" type="button">断绳坠落</button>
          <button id="playBtn" type="button">自动演示</button>
          <button id="resetBtn" type="button">重来</button>
        </div>
      </section>
    </main>
    <div class="bottom-remote" aria-label="屏幕下方电梯控制器">
      <strong>电梯按钮</strong>
      <button data-elevator-action="up" type="button">上到 2 楼</button>
      <button data-elevator-action="down" type="button">下到 1 楼</button>
      <button data-elevator-action="open" type="button">开门</button>
      <button data-elevator-action="close" type="button">关门</button>
      <button data-elevator-action="fall" type="button">断绳坠落</button>
      <button data-elevator-action="demo" type="button">自动演示</button>
      <button data-elevator-action="reset" type="button">重来</button>
    </div>
    <style>
      .bottom-remote {
        position: fixed !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        z-index: 2147483647 !important;
        display: grid !important;
        grid-template-columns: repeat(4, minmax(74px, 1fr)) !important;
        gap: 8px !important;
        padding: 10px 12px 12px !important;
        border-top: 5px solid #172632 !important;
        background: #ffd15f !important;
        box-shadow: 0 -12px 38px rgba(23, 38, 50, 0.3) !important;
      }

      .bottom-remote strong {
        grid-column: 1 / -1 !important;
        font-size: 18px !important;
        font-weight: 950 !important;
      }

      .bottom-remote button {
        min-height: 48px !important;
        border: 0 !important;
        border-radius: 8px !important;
        color: white !important;
        background: #245b8f !important;
        font: 950 15px/1.1 ui-sans-serif, system-ui, sans-serif !important;
      }

      .bottom-remote button[data-elevator-action="fall"] {
        background: #8b1e2d !important;
      }

      @media (max-width: 680px) {
        .bottom-remote {
          grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        }
      }
    </style>
    <script src="elevator-tower.js"></script>
  </body>
</html>
