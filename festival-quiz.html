<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>节日题</title>
    <link rel="stylesheet" href="study-games.css" />
  </head>
  <body data-game="festival">
    <a class="home-link" href="arcade.html">游戏大厅</a>
    <main class="study-shell">
      <section class="study-stage festival-stage">
        <div class="score-row">
          <span>分数 <strong id="scoreText">0</strong></span>
          <span>第 <strong id="roundText">1</strong> 题</span>
        </div>
        <div class="big-card">
          <p class="label">Festival Quiz</p>
          <h1 id="questionText">春节是农历哪一天？</h1>
          <p id="hintText">中国传统节日和外国节日分开练。</p>
        </div>
        <div class="answer-grid" id="answerGrid"></div>
      </section>

      <section class="study-panel">
        <p class="label">练习节日</p>
        <h2>节日题</h2>
        <p id="statusText">春节、元宵、端午、中秋、七夕、清明，还有圣诞节、万圣节、情人节、感恩节。</p>
        <button id="nextBtn" type="button">下一题</button>
        <button id="restartBtn" type="button">重新开始</button>
      </section>
    </main>
    <script src="study-games.js"></script>
  </body>
</html>
