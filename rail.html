<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>高铁驾驶</title>
    <link rel="stylesheet" href="mini-games.css" />
  </head>
  <body>
    <main class="game-shell">
      <section>
        <div class="topbar">
          <div>
            <p class="label">High Speed Rail</p>
            <h1>高铁驾驶</h1>
          </div>
          <a href="arcade.html">游戏大厅</a>
        </div>
        <div class="stage rail-stage">
          <div class="station" style="left: 10%">广州南</div>
          <div class="station" style="left: 45%">长沙南</div>
          <div class="station" style="left: 78%">上海虹桥</div>
          <div class="rail-track"></div>
          <div class="train" id="train"></div>
        </div>
      </section>
      <aside class="side">
        <section class="panel">
          <p class="label">仪表</p>
          <h2 id="statusText">准备发车</h2>
          <p>速度：<strong id="speedText">0</strong> km/h</p>
          <p>距离：<strong id="distanceText">0</strong>%</p>
          <p>下一站：<strong id="nextText">长沙南</strong></p>
        </section>
        <section class="panel controls">
          <button class="primary" id="accelBtn" type="button">A 加速</button>
          <button id="brakeBtn" type="button">S 刹车</button>
          <button id="doorBtn" type="button">D 开门</button>
          <button id="resetBtn" type="button">R 重来</button>
        </section>
        <section class="panel">
          <p class="label">记录</p>
          <ol class="log" id="log"></ol>
        </section>
      </aside>
    </main>
    <script src="rail.js"></script>
  </body>
</html>
