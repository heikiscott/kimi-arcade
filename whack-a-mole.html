<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>打地鼠</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  body {
    font-family: -apple-system, "PingFang SC", sans-serif;
    background: linear-gradient(180deg, #87CEEB 0%, #98D8C8 60%, #8B6F47 60%, #6B4423 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><rect x="18" y="2" width="4" height="20" fill="%238B4513"/><rect x="10" y="22" width="20" height="14" rx="2" fill="%23A0522D" stroke="%23000" stroke-width="1.5"/></svg>') 20 20, auto;
  }
  h1 { color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); margin-bottom: 10px; }
  .home-link {
    position: fixed;
    top: 18px;
    left: 18px;
    z-index: 10;
    padding: 10px 14px;
    border-radius: 8px;
    background: rgba(255,255,255,0.9);
    color: #172632;
    font-weight: 900;
    text-decoration: none;
    box-shadow: 0 12px 26px rgba(23,38,50,0.16);
  }
  .panel {
    display: flex; gap: 20px; margin-bottom: 20px;
    background: rgba(255,255,255,0.9);
    padding: 12px 24px; border-radius: 12px;
    font-size: 18px; font-weight: bold;
  }
  .panel span { color: #d2691e; }
  button {
    padding: 10px 24px; font-size: 16px; font-weight: bold;
    background: #ff6347; color: white; border: none;
    border-radius: 8px; cursor: pointer;
    box-shadow: 0 4px 0 #c0392b;
    transition: transform 0.1s;
  }
  button:hover { transform: translateY(-2px); }
  button:active { transform: translateY(2px); box-shadow: 0 2px 0 #c0392b; }
  .board {
    display: grid;
    grid-template-columns: repeat(3, 120px);
    grid-template-rows: repeat(3, 120px);
    gap: 30px;
    margin-top: 20px;
  }
  .hole {
    position: relative;
    width: 120px; height: 120px;
    background: radial-gradient(ellipse at center, #2a1810 0%, #4a3020 70%, #6B4423 100%);
    border-radius: 50%;
    overflow: hidden;
    box-shadow: inset 0 8px 16px rgba(0,0,0,0.6);
  }
  .mole {
    position: absolute;
    bottom: -100%;
    left: 50%;
    transform: translateX(-50%);
    width: 90px; height: 90px;
    transition: bottom 0.15s ease-out;
    cursor: pointer;
  }
  .mole.up { bottom: 10%; }
  .mole.hit { bottom: 10%; }
  .mole svg { width: 100%; height: 100%; pointer-events: none; }
  .score-pop {
    position: absolute;
    color: #ffeb3b;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 2px 2px 4px #000;
    pointer-events: none;
    animation: popUp 0.6s ease-out forwards;
  }
  @keyframes popUp {
    0% { transform: translate(-50%, 0) scale(0.5); opacity: 1; }
    100% { transform: translate(-50%, -60px) scale(1.5); opacity: 0; }
  }
  .game-over {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 30px 50px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    display: none;
    z-index: 100;
  }
  .game-over.show { display: block; }
  .game-over h2 { color: #ff6347; margin-bottom: 10px; }
  .game-over p { font-size: 20px; margin: 10px 0; }
</style>
</head>
<body>
  <a class="home-link" href="arcade.html">游戏大厅</a>
  <h1>🔨 打地鼠 🐹</h1>
  <div class="panel">
    <div>得分: <span id="score">0</span></div>
    <div>时间: <span id="time">30</span>s</div>
    <div>最高: <span id="best">0</span></div>
  </div>
  <button id="startBtn">开始游戏</button>
  <div class="board" id="board"></div>

  <div class="game-over" id="gameOver">
    <h2>游戏结束!</h2>
    <p>你的得分: <span id="finalScore">0</span></p>
    <p id="comment"></p>
    <button onclick="document.getElementById('gameOver').classList.remove('show')">关闭</button>
  </div>

<script>
const moleSVG = `
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="50" cy="65" rx="38" ry="32" fill="#8B4513"/>
  <ellipse cx="50" cy="55" rx="32" ry="28" fill="#A0522D"/>
  <ellipse cx="50" cy="70" rx="22" ry="14" fill="#D2B48C"/>
  <circle cx="38" cy="50" r="5" fill="#fff"/>
  <circle cx="62" cy="50" r="5" fill="#fff"/>
  <circle cx="38" cy="51" r="3" fill="#000"/>
  <circle cx="62" cy="51" r="3" fill="#000"/>
  <ellipse cx="50" cy="62" rx="4" ry="3" fill="#000"/>
  <rect x="46" y="64" width="3" height="6" fill="#fff"/>
  <rect x="51" y="64" width="3" height="6" fill="#fff"/>
  <ellipse cx="28" cy="42" rx="6" ry="8" fill="#8B4513"/>
  <ellipse cx="72" cy="42" rx="6" ry="8" fill="#8B4513"/>
</svg>`;

const bombSVG = `
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <circle cx="50" cy="60" r="32" fill="#222"/>
  <circle cx="42" cy="52" r="6" fill="#555"/>
  <rect x="46" y="22" width="8" height="12" fill="#444"/>
  <path d="M 50 22 Q 60 12 70 18" stroke="#888" stroke-width="3" fill="none"/>
  <circle cx="70" cy="16" r="4" fill="#ff6b00"/>
  <circle cx="68" cy="14" r="2" fill="#ffeb3b"/>
</svg>`;

const board = document.getElementById('board');
const scoreEl = document.getElementById('score');
const timeEl = document.getElementById('time');
const bestEl = document.getElementById('best');
const startBtn = document.getElementById('startBtn');
const gameOverEl = document.getElementById('gameOver');

let score = 0;
let timeLeft = 30;
let playing = false;
let popTimer, gameTimer;
let best = +(localStorage.getItem('whackBest') || 0);
bestEl.textContent = best;

const holes = [];
for (let i = 0; i < 9; i++) {
  const hole = document.createElement('div');
  hole.className = 'hole';
  const mole = document.createElement('div');
  mole.className = 'mole';
  mole.dataset.index = i;
  hole.appendChild(mole);
  board.appendChild(hole);
  holes.push({ hole, mole, active: false, isBomb: false });

  mole.addEventListener('click', (e) => {
    if (!playing || !holes[i].active) return;
    const h = holes[i];
    if (h.isBomb) {
      score = Math.max(0, score - 5);
      showPop(h.hole, '-5', '#ff1744');
      flashRed();
    } else {
      score += 1;
      showPop(h.hole, '+1', '#ffeb3b');
    }
    scoreEl.textContent = score;
    h.mole.classList.remove('up');
    h.active = false;
  });
}

function showPop(hole, text, color) {
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = text;
  pop.style.color = color;
  pop.style.left = '50%';
  pop.style.top = '20%';
  hole.appendChild(pop);
  setTimeout(() => pop.remove(), 600);
}

function flashRed() {
  document.body.style.transition = 'background 0.1s';
  const orig = document.body.style.background;
  document.body.style.background = '#ff1744';
  setTimeout(() => { document.body.style.background = ''; }, 100);
}

function popMole() {
  if (!playing) return;
  const idle = holes.filter(h => !h.active);
  if (idle.length === 0) return;
  const h = idle[Math.floor(Math.random() * idle.length)];
  h.isBomb = Math.random() < 0.18;
  h.mole.innerHTML = h.isBomb ? bombSVG : moleSVG;
  h.active = true;
  h.mole.classList.add('up');
  const stayTime = 600 + Math.random() * 700;
  setTimeout(() => {
    if (h.active) {
      h.mole.classList.remove('up');
      h.active = false;
    }
  }, stayTime);
}

function startGame() {
  score = 0;
  timeLeft = 30;
  playing = true;
  scoreEl.textContent = '0';
  timeEl.textContent = '30';
  startBtn.disabled = true;
  startBtn.textContent = '游戏中...';
  gameOverEl.classList.remove('show');

  gameTimer = setInterval(() => {
    timeLeft--;
    timeEl.textContent = timeLeft;
    if (timeLeft <= 0) endGame();
  }, 1000);

  const tick = () => {
    if (!playing) return;
    popMole();
    const delay = Math.max(300, 900 - (30 - timeLeft) * 20);
    popTimer = setTimeout(tick, delay);
  };
  tick();
}

function endGame() {
  playing = false;
  clearInterval(gameTimer);
  clearTimeout(popTimer);
  holes.forEach(h => { h.mole.classList.remove('up'); h.active = false; });
  startBtn.disabled = false;
  startBtn.textContent = '再来一次';

  if (score > best) {
    best = score;
    localStorage.setItem('whackBest', best);
    bestEl.textContent = best;
  }
  document.getElementById('finalScore').textContent = score;
  let comment = '继续努力!';
  if (score >= 30) comment = '神级反应! 🏆';
  else if (score >= 20) comment = '高手! 👏';
  else if (score >= 10) comment = '不错哦! 👍';
  document.getElementById('comment').textContent = comment;
  gameOverEl.classList.add('show');
}

startBtn.addEventListener('click', startGame);
</script>
</body>
</html>
